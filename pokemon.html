<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Team Builder</title>

    <link rel="stylesheet" href="pokemon.css" />
    <script src="pokemon-team-builder.js" defer></script>
  </head>

  <body>
    <main class="card">
      <h1 class="title">Pokemon Team Builder</h1>

      <div class="searchRow">
        <label for="pokeQuery" class="label">Name or ID</label>
        <input id="pokeQuery" type="text" autocomplete="off" />
        <button id="btnFind" type="button">Find</button>
      </div>

      <p id="status" class="status"></p>

      <div class="preview">
        <img id="pokeImg" alt="" />
      </div>

      <audio id="pokeAudio" controls></audio>

      <div class="movesGrid">
        <select id="move1"></select>
        <select id="move3"></select>
        <select id="move2"></select>
        <select id="move4"></select>
      </div>

      <button id="btnAdd" type="button" disabled>Add to Team</button>

      <section class="team">
        <h2>Team</h2>
        <table id="teamTable">
          <tbody></tbody>
        </table>
      </section>
    </main>
  </body>
</html>
